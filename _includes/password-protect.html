{% if page.password_hash %}
<style>
  html.password-locked .masthead,
  html.password-locked .initial-content,
  html.password-locked .search-content,
  html.password-locked .page__footer {
    display: none !important;
  }

  html.password-locked body {
    min-height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 46%, #ffffff 100%);
    color: #0f172a;
  }

  #password-gate {
    width: min(92vw, 430px);
    margin: 16vh auto 0;
    padding: 34px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.94);
    box-shadow: 0 22px 70px rgba(15, 23, 42, 0.12);
    font-family: Inter, "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #password-gate .password-badge {
    display: inline-flex;
    align-items: center;
    margin-bottom: 18px;
    padding: 6px 10px;
    border: 1px solid #e0e7ff;
    border-radius: 999px;
    background: #eef2ff;
    color: #4338ca;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0;
  }

  #password-gate h2 {
    margin: 0;
    color: #111827;
    font-size: 1.8rem;
    line-height: 1.2;
  }

  #password-gate p {
    margin: 10px 0 22px;
    color: #64748b;
    font-size: 0.96rem;
    line-height: 1.65;
  }

  #password-gate label {
    display: block;
    margin-bottom: 8px;
    color: #334155;
    font-size: 0.9rem;
    font-weight: 700;
  }

  #password-gate .password-field {
    position: relative;
  }

  #password-gate input {
    width: 100%;
    box-sizing: border-box;
    height: 48px;
    padding: 0 46px 0 14px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    background: #fff;
    color: #0f172a;
    font-size: 1rem;
    outline: none;
    transition: border-color 160ms ease, box-shadow 160ms ease;
  }

  #password-gate input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.13);
  }

  #password-gate .password-toggle {
    position: absolute;
    top: 50%;
    right: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    margin: 0;
    padding: 0;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: #64748b;
    cursor: pointer;
    transform: translateY(-50%);
    transition: color 160ms ease, background 160ms ease;
  }

  #password-gate .password-toggle:hover,
  #password-gate .password-toggle:focus {
    background: #eef2ff;
    color: #4338ca;
    outline: none;
  }

  #password-gate .password-toggle svg {
    width: 19px;
    height: 19px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  #password-gate #password-submit {
    width: 100%;
    height: 46px;
    margin-top: 18px;
    border: 1px solid #4f46e5;
    border-radius: 8px;
    background: #4f46e5;
    color: #fff;
    font-size: 0.98rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
  }

  #password-gate #password-submit:hover {
    border-color: #4338ca;
    background: #4338ca;
    transform: translateY(-1px);
  }

  #password-error {
    display: none;
    margin-top: 12px;
    color: #dc2626;
    font-size: 0.9rem;
    font-weight: 600;
  }
</style>

<script>
(function () {
  var expectedHash = "{{ page.password_hash }}";
  var storageKey = "post-password:" + window.location.pathname;

  function unlock(gate) {
    sessionStorage.setItem(storageKey, "ok");
    if (gate) gate.remove();
    document.documentElement.classList.remove("password-locked");
  }

  function showGate() {
    if (sessionStorage.getItem(storageKey) === "ok") {
      document.documentElement.classList.remove("password-locked");
      return;
    }

    var gate = document.createElement("div");
    gate.id = "password-gate";
    gate.innerHTML = [
      "<div class=\"password-badge\">YangGroup@HFNL</div>",
      "<h2>访问受限内容</h2>",
      "<p>请输入 YangGroup@HFNL 访问密码以继续阅读本文。</p>",
      "<label for=\"password-input\">访问密码</label>",
      "<div class=\"password-field\">",
      "<input id=\"password-input\" type=\"password\" autocomplete=\"current-password\" aria-label=\"访问密码\">",
      "<button id=\"password-toggle\" class=\"password-toggle\" type=\"button\" aria-label=\"显示密码\" title=\"显示密码\">",
      "<svg class=\"icon-eye\" viewBox=\"0 0 24 24\" aria-hidden=\"true\" style=\"display:none\"><path d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z\"></path><circle cx=\"12\" cy=\"12\" r=\"3\"></circle></svg>",
      "<svg class=\"icon-eye-off\" viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M3 3l18 18\"></path><path d=\"M10.6 10.6A2 2 0 0 0 12 14a2 2 0 0 0 1.4-.6\"></path><path d=\"M9.9 4.2A10.8 10.8 0 0 1 12 4c6.5 0 10 8 10 8a18.6 18.6 0 0 1-3.1 4.3\"></path><path d=\"M6.5 6.7C3.6 8.8 2 12 2 12s3.5 8 10 8a10.7 10.7 0 0 0 4.1-.8\"></path></svg>",
      "</button>",
      "</div>",
      "<button id=\"password-submit\" type=\"button\">解锁文章</button>",
      "<div id=\"password-error\">密码错误，请联系管理员或从群聊获取访问密码。</div>"
    ].join("");
    document.body.prepend(gate);

    var input = document.getElementById("password-input");
    var error = document.getElementById("password-error");
    var toggle = document.getElementById("password-toggle");
    var eyeIcon = toggle.querySelector(".icon-eye");
    var eyeOffIcon = toggle.querySelector(".icon-eye-off");

    async function sha256Hex(value) {
      var data = new TextEncoder().encode(value);
      var digest = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(digest)).map(function (byte) {
        return byte.toString(16).padStart(2, "0");
      }).join("");
    }

    async function checkPassword() {
      if (!window.crypto || !window.crypto.subtle) {
        error.textContent = "当前浏览器不支持密码校验";
        error.style.display = "block";
        return;
      }

      if (await sha256Hex(input.value) === expectedHash) {
        unlock(gate);
        return;
      }

      error.textContent = "密码错误，请联系管理员或从群聊获取访问密码。";
      error.style.display = "block";
      input.value = "";
      input.focus();
    }

    function showPassword(show) {
      input.type = show ? "text" : "password";
      toggle.setAttribute("aria-label", show ? "隐藏密码" : "显示密码");
      toggle.setAttribute("title", show ? "隐藏密码" : "显示密码");
      eyeIcon.style.display = show ? "" : "none";
      eyeOffIcon.style.display = show ? "none" : "";
    }

    document.getElementById("password-submit").addEventListener("click", checkPassword);
    toggle.addEventListener("click", function () {
      showPassword(input.type === "password");
      input.focus();
    });
    input.addEventListener("keydown", function (event) {
      if (event.key === "Enter") checkPassword();
    });
    input.focus();
  }

  document.documentElement.classList.add("password-locked");
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", showGate);
  } else {
    showGate();
  }
}());
</script>
{% endif %}
